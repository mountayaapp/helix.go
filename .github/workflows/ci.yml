name: GitHub CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    if: "!startsWith(github.event.head_commit.message, 'version: Release')"
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Run linters
        run: make lint

  test:
    if: "!startsWith(github.event.head_commit.message, 'version: Release')"
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: make test
